<!DOCTYPE html>
<html>
<head>
  <title>Finance App - Lucas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f1f3f6;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .switch {
      display: flex;
      margin-bottom: 20px;
    }

    .switch button {
      flex: 1;
      padding: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .active {
      background: black;
      color: white;
    }

    .inactive {
      background: #ddd;
    }

    .grid {
      display: block;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .receita { color: green; }
    .despesa { color: red; }

    .grafico-container {
      max-width: 220px;
      margin: 15px auto;
    }

    @media (min-width: 768px) {

      .container {
        max-width: 1000px;
        margin: auto;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

    }
  </style>
</head>
<body>

<header>
  <h2>Finance App</h2>
</header>

<div class="container">

  <div class="switch">
    <button id="btnBarbearia" onclick="trocarConta('barbearia')">Barbearia</button>
    <button id="btnPessoal" onclick="trocarConta('pessoal')">Pessoal</button>
  </div>

  <div class="grid">

    <!-- Dashboard -->
    <div class="card">
      <h3>Dashboard</h3>

      <input type="month" id="filtroMes" onchange="atualizarTudo()">

      <p>Receitas: <span id="totalReceitas">R$ 0,00</span></p>
      <p>Despesas: <span id="totalDespesas">R$ 0,00</span></p>
      <p><strong>Saldo: <span id="saldo">R$ 0,00</span></strong></p>

      <div class="grafico-container">
        <canvas id="grafico"></canvas>
      </div>
    </div>

    <!-- Novo Lançamento -->
    <div class="card">
      <h3>Novo Lançamento</h3>

      <select id="tipo">
        <option value="receita">Receita</option>
        <option value="despesa">Despesa</option>
      </select>

      <input type="date" id="data">

      <input type="number" id="valor" placeholder="Valor">

      <select id="categoria">
        <option value="servico">Serviço</option>
        <option value="produto">Produto</option>
        <option value="fixo">Fixo</option>
        <option value="variavel">Variável</option>
      </select>

      <button onclick="salvar()">Salvar</button>
    </div>

  </div>

  <!-- Registros -->
  <div class="card">
    <h3>Registros</h3>
    <ul id="lista"></ul>
  </div>

</div>

<script>

  let contaAtual = "barbearia";

  let registros = JSON.parse(localStorage.getItem("registros")) || {
    barbearia: [],
    pessoal: []
  };

  let grafico;

  function formatarReal(valor) {
    return valor.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  }

  function definirDataHoje() {
    const hoje = new Date().toISOString().split("T")[0];
    document.getElementById("data").value = hoje;
  }

  function trocarConta(conta) {
    contaAtual = conta;
    atualizarBotoes();
    atualizarTudo();
  }

  function atualizarBotoes() {
    document.getElementById("btnBarbearia").className =
      contaAtual === "barbearia" ? "active" : "inactive";

    document.getElementById("btnPessoal").className =
      contaAtual === "pessoal" ? "active" : "inactive";
  }

  function salvar() {
    const tipo = document.getElementById("tipo").value;
    const valor = parseFloat(document.getElementById("valor").value);
    const categoria = document.getElementById("categoria").value;
    const data = document.getElementById("data").value;

    if (!valor || !data) return alert("Preencha valor e data");

    const registro = { tipo, valor, categoria, data };

    registros[contaAtual].push(registro);

    localStorage.setItem("registros", JSON.stringify(registros));

    atualizarTudo();
  }

  function mesRegistro(data) {
    return data.slice(0,7);
  }

  function atualizarDashboard() {

    const mesSelecionado = document.getElementById("filtroMes").value;

    let receitas = 0;
    let despesas = 0;

    registros[contaAtual].forEach(r => {

      if (mesSelecionado && mesRegistro(r.data) !== mesSelecionado) return;

      if (r.tipo === "receita") receitas += r.valor;
      if (r.tipo === "despesa") despesas += r.valor;
    });

    document.getElementById("totalReceitas").innerText = formatarReal(receitas);
    document.getElementById("totalDespesas").innerText = formatarReal(despesas);
    document.getElementById("saldo").innerText = formatarReal(receitas - despesas);

    atualizarGrafico(receitas, despesas);
  }

  function atualizarLista() {

    const mesSelecionado = document.getElementById("filtroMes").value;
    const lista = document.getElementById("lista");

    lista.innerHTML = "";

    registros[contaAtual].forEach(r => {

      if (mesSelecionado && mesRegistro(r.data) !== mesSelecionado) return;

      const item = document.createElement("li");
      item.className = r.tipo;
      item.innerText =
        `${r.data} - ${r.tipo} - ${formatarReal(r.valor)} (${r.categoria})`;

      lista.appendChild(item);
    });
  }

  function atualizarGrafico(receitas, despesas) {

    const ctx = document.getElementById("grafico");

    if (grafico) grafico.destroy();

    grafico = new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: ["Receitas", "Despesas"],
        datasets: [{
          data: [receitas, despesas]
        }]
      }
    });
  }

  function atualizarTudo() {
    atualizarDashboard();
    atualizarLista();
  }

  atualizarBotoes();
  definirDataHoje();
  atualizarTudo();

</script>

</body>
</html>
