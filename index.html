<!DOCTYPE html>
<html>
<head>
  <title>Finance App - Lucas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; margin: 0; background: #f1f3f6; }
    header { background: black; color: white; padding: 15px; text-align: center; }
    .container { padding: 20px; }

    .switch { display: flex; margin-bottom: 20px; }
    .switch button {
      flex: 1;
      padding: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .active { background: black; color: white; }
    .inactive { background: #ddd; }

    .grid { display: block; }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .grafico-container {
      max-width: 220px;
      margin: 15px auto;
    }

    .categoria-item, .registro-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .registro-item button,
    .categoria-item button {
      width: auto;
      margin-left: 5px;
      padding: 5px 8px;
    }

    @media (min-width: 768px) {
      .container { max-width: 1000px; margin: auto; }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
    }
  </style>
</head>
<body>

<header>
  <h2>Finance App</h2>
</header>

<div class="container">

  <div class="switch">
    <button id="btnBarbearia" onclick="trocarConta('barbearia')">Barbearia</button>
    <button id="btnPessoal" onclick="trocarConta('pessoal')">Pessoal</button>
  </div>

  <div class="grid">

    <div class="card">
      <h3>Dashboard</h3>
      <input type="month" id="filtroMes" onchange="atualizarTudo()">

      <p>Receitas: <span id="totalReceitas">R$ 0,00</span></p>
      <p>Despesas: <span id="totalDespesas">R$ 0,00</span></p>
      <p><strong>Saldo: <span id="saldo">R$ 0,00</span></strong></p>

      <div class="grafico-container">
        <canvas id="grafico"></canvas>
      </div>
    </div>

    <div class="card">
      <h3>Novo Lançamento</h3>

      <select id="tipo">
        <option value="receita">Receita</option>
        <option value="despesa">Despesa</option>
      </select>

      <input type="date" id="data">
      <input type="number" id="valor" placeholder="Valor">
      <select id="categoria"></select>

      <button onclick="salvar()">Salvar</button>
    </div>

  </div>

  <div class="card">
    <h3>Categorias</h3>
    <input type="text" id="novaCategoria" placeholder="Nova categoria">
    <button onclick="adicionarCategoria()">Adicionar</button>
    <div id="listaCategorias"></div>
  </div>

  <div class="card">
    <h3>Registros</h3>
    <div id="lista"></div>
  </div>

</div>

<script>

let contaAtual = "barbearia";
let editandoIndex = null;

let registros = JSON.parse(localStorage.getItem("registros")) || {
  barbearia: [],
  pessoal: []
};

let categorias = JSON.parse(localStorage.getItem("categorias")) || {
  barbearia: ["Serviço", "Produto", "Fixo"],
  pessoal: ["Alimentação", "Lazer", "Contas"]
};

let grafico;

function salvarStorage() {
  localStorage.setItem("registros", JSON.stringify(registros));
  localStorage.setItem("categorias", JSON.stringify(categorias));
}

function formatarReal(valor) {
  return valor.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

function definirDataHoje() {
  document.getElementById("data").value =
    new Date().toISOString().split("T")[0];
}

function trocarConta(conta) {
  contaAtual = conta;
  atualizarBotoes();
  atualizarTudo();
}

function atualizarBotoes() {
  btnBarbearia.className = contaAtual === "barbearia" ? "active" : "inactive";
  btnPessoal.className = contaAtual === "pessoal" ? "active" : "inactive";
}

function atualizarSelectCategorias() {
  const select = document.getElementById("categoria");
  select.innerHTML = "";
  categorias[contaAtual].forEach(cat => {
    const option = document.createElement("option");
    option.value = cat;
    option.textContent = cat;
    select.appendChild(option);
  });
}

function adicionarCategoria() {
  const nome = novaCategoria.value.trim();
  if (!nome) return;
  categorias[contaAtual].push(nome);
  salvarStorage();
  novaCategoria.value = "";
  atualizarTudo();
}

function salvar() {

  const tipo = tipo.value;
  const valorNum = parseFloat(valor.value);
  const categoriaValor = categoria.value;
  const dataValor = data.value;

  if (!valorNum || !dataValor) return alert("Preencha valor e data");

  const registro = {
    tipo: tipo.value,
    valor: valorNum,
    categoria: categoriaValor,
    data: dataValor
  };

  if (editandoIndex !== null) {
    registros[contaAtual][editandoIndex] = registro;
    editandoIndex = null;
  } else {
    registros[contaAtual].push(registro);
  }

  salvarStorage();
  atualizarTudo();
  limparFormulario();
}

function editarRegistro(index) {
  const r = registros[contaAtual][index];

  tipo.value = r.tipo;
  valor.value = r.valor;
  categoria.value = r.categoria;
  data.value = r.data;

  editandoIndex = index;
}

function excluirRegistro(index) {
  if (!confirm("Excluir registro?")) return;
  registros[contaAtual].splice(index, 1);
  salvarStorage();
  atualizarTudo();
}

function limparFormulario() {
  valor.value = "";
  definirDataHoje();
}

function mesRegistro(data) {
  return data.slice(0,7);
}

function atualizarDashboard() {

  const mesSelecionado = filtroMes.value;

  let receitas = 0;
  let despesas = 0;

  registros[contaAtual].forEach(r => {

    if (mesSelecionado && mesRegistro(r.data) !== mesSelecionado) return;

    if (r.tipo === "receita") receitas += r.valor;
    if (r.tipo === "despesa") despesas += r.valor;
  });

  totalReceitas.innerText = formatarReal(receitas);
  totalDespesas.innerText = formatarReal(despesas);
  saldo.innerText = formatarReal(receitas - despesas);

  atualizarGrafico(receitas, despesas);
}

function atualizarLista() {

  const mesSelecionado = filtroMes.value;
  lista.innerHTML = "";

  registros[contaAtual].forEach((r, index) => {

    if (mesSelecionado && mesRegistro(r.data) !== mesSelecionado) return;

    const div = document.createElement("div");
    div.className = "registro-item";

    div.innerHTML = `
      <span>${r.data} - ${r.tipo} - ${formatarReal(r.valor)} (${r.categoria})</span>
      <div>
        <button onclick="editarRegistro(${index})">✏️</button>
        <button onclick="excluirRegistro(${index})">🗑️</button>
      </div>
    `;

    lista.appendChild(div);
  });
}

function atualizarGrafico(receitas, despesas) {

  if (grafico) grafico.destroy();

  grafico = new Chart(document.getElementById("grafico"), {
    type: "doughnut",
    data: {
      labels: ["Receitas", "Despesas"],
      datasets: [{ data: [receitas, despesas] }]
    }
  });
}

function atualizarTudo() {
  atualizarSelectCategorias();
  atualizarDashboard();
  atualizarLista();
}

atualizarBotoes();
definirDataHoje();
atualizarTudo();

</script>

</body>
</html>
